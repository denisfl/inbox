services:
  # Redis - Cache and job queue
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # Ollama - AI classification (mistral 4.1GB model)
  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    # Ollama serves automatically, no custom command needed

  # PostgreSQL database (optional - using SQLite by default)
  # db:
  #   image: postgres:16-alpine
  #   environment:
  #     POSTGRES_DB: inbox_production
  #     POSTGRES_USER: inbox
  #     POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   ports:
  #     - "5432:5432"
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U inbox"]
  #     interval: 5s
  #     timeout: 3s
  #     retries: 5
  #   restart: unless-stopped

  # Rails web server (Puma)
  web:
    build:
      context: .
      target: development
    command: bundle exec rails server -b 0.0.0.0
    ports:
      - "3000:3000"
    volumes:
      - storage_data:/app/storage
      - log_data:/app/log
    environment:
      - REDIS_URL=redis://redis:6379/0
      - OLLAMA_BASE_URL=http://ollama:11434
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_BOT_NAME=${TELEGRAM_BOT_NAME}
      - TELEGRAM_ALLOWED_USER_ID=${TELEGRAM_ALLOWED_USER_ID}
      - TELEGRAM_WEBHOOK_URL=${TELEGRAM_WEBHOOK_URL}
      - API_TOKEN=${API_TOKEN}
      - WHISPER_BASE_URL=http://whisper:5000
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REFRESH_TOKEN=${GOOGLE_REFRESH_TOKEN}
      - GOOGLE_CALENDAR_IDS=${GOOGLE_CALENDAR_IDS:-primary}
      - CALENDAR_REMINDER_MINUTES=${CALENDAR_REMINDER_MINUTES:-10}
      - RAILS_HOSTS=${RAILS_HOSTS}
    depends_on:
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/up"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    secrets:
      - telegram_bot_token
      - telegram_webhook_secret_token

  # Sidekiq worker (background jobs)
  worker:
    build:
      context: .
      target: development
    command: bundle exec sidekiq -C config/sidekiq.yml
    volumes:
      - storage_data:/app/storage
      - log_data:/app/log
    environment:
      - REDIS_URL=redis://redis:6379/0
      - OLLAMA_BASE_URL=http://ollama:11434
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - API_TOKEN=${API_TOKEN}
      - WHISPER_BASE_URL=http://whisper:5000
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REFRESH_TOKEN=${GOOGLE_REFRESH_TOKEN}
      - GOOGLE_CALENDAR_IDS=${GOOGLE_CALENDAR_IDS:-primary}
      - CALENDAR_REMINDER_MINUTES=${CALENDAR_REMINDER_MINUTES:-10}
      - RAILS_HOSTS=${RAILS_HOSTS}
    depends_on:
      - redis
      - web
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "bundle exec sidekiqmon processes 2>/dev/null | grep -q . || pgrep -f sidekiq > /dev/null",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    secrets:
      - telegram_bot_token
      - telegram_webhook_secret_token

  # Whisper - Audio transcription service
  whisper:
    build:
      context: ./whisper_service
    volumes:
      - ./tmp/audio:/tmp/audio
      - whisper_models:/root/.cache/huggingface
    environment:
      - WHISPER_MODEL_SIZE=base
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 60s
    restart: unless-stopped

volumes:
  redis_data:
  ollama_data:
  node_modules:
  db_data:
  storage_data:
  log_data:
  whisper_models:
  # postgres_data:  # Uncomment if using PostgreSQL

secrets:
  telegram_bot_token:
    file: ./secrets/telegram_bot_token
  telegram_webhook_secret_token:
    file: ./secrets/telegram_webhook_secret_token
